<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sudoku Collection</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .menu-container { text-align: center; margin-top: 100px; }
        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 40px auto;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,0.15); }
        .card h2 { margin: 0 0 10px 0; color: #1976d2; }
        .tag { font-size: 12px; background: #e0e0e0; padding: 3px 8px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>Sudoku Collection</h1>
        <p>バリエーション豊かな数独を楽しみましょう！</p>
        <div class="difficulty-grid">
            <a href="game.html?mode=vanilla" class="card">
                <span class="tag">スタンダード</span>
                <h2>Vanilla</h2>
                <p>通常の数独ルールです。</p>
            </a>
            <a href="game.html?mode=diagonal" class="card">
                <span class="tag">チャレンジ</span>
                <h2>Diagonal</h2>
                <p>対角線上にも1から9の数字が入ります。</p>
            </a>
            <a href="game.html?mode=extra" class="card">
                <span class="tag">変則エリア</span>
                <h2>Extra Regions</h2>
                <p>指定された4つの追加エリアも1から9が入ります。</p>
            </a>
            <a href="game.html?mode=inequality" class="card">
                <span class="tag">不等号数独</span>
                <h2>Inequality</h2>
                <p>不等号の条件を満たすように数字を埋めます。</p>
            </a>
        </div>
    </div>
</body>
</html>
